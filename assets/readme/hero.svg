<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">AmpBridge local traffic router for AMP provider requests</title>
  <desc id="desc">AMP traffic enters a local Swift bridge, with internal routes sent to ampcode.com and provider routes switched between official and local backends.</desc>
  <rect width="1200" height="380" rx="22" fill="#0b1010"/>
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
    <text x="54" y="52" font-size="15" fill="#69e6a6" letter-spacing="2">SWIFT 5.9 · macOS 13+ · localhost:8327</text>
    <text x="54" y="132" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="66" font-weight="750" fill="#f4f7f5">AmpBridge</text>
    <text x="54" y="177" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" fill="#aebbb5">Local providers. Official auth stays official.</text>
    <rect x="54" y="225" width="392" height="86" rx="8" fill="#121a18" stroke="#2f463d"/>
    <text x="76" y="256" font-size="14" fill="#7f938a">$ AMP_URL=http://localhost:8327</text>
    <text x="76" y="282" font-size="14" fill="#f4f7f5">amp --mode deep</text>
  </g>
  <g transform="translate(522 48)" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">
    <rect x="0" y="110" width="146" height="74" rx="8" fill="#18201e" stroke="#69e6a6" stroke-width="2"/>
    <text x="37" y="140" fill="#69e6a6">AMP CLI</text><text x="28" y="162" fill="#819088">request in</text>
    <path d="M146 147H218" stroke="#69e6a6" stroke-width="3"/><path d="M208 139L218 147 208 155" fill="none" stroke="#69e6a6" stroke-width="3"/>
    <rect x="218" y="77" width="180" height="140" rx="10" fill="#f4f7f5"/>
    <text x="244" y="120" font-size="18" font-weight="700" fill="#0b1010">AMPBRIDGE</text>
    <text x="253" y="150" fill="#44524c">route + rewrite</text>
    <text x="274" y="178" fill="#44524c">:8327</text>
    <path d="M398 115H470V55H522" fill="none" stroke="#f0a34b" stroke-width="3"/>
    <path d="M398 180H470V260H522" fill="none" stroke="#69e6a6" stroke-width="3"/>
    <rect x="522" y="12" width="146" height="82" rx="8" fill="#201b14" stroke="#f0a34b"/>
    <text x="543" y="44" fill="#f0a34b">ampcode.com</text><text x="546" y="68" fill="#9e8c75">auth · internal</text>
    <rect x="522" y="219" width="146" height="82" rx="8" fill="#122019" stroke="#69e6a6"/>
    <text x="540" y="251" fill="#69e6a6">127.0.0.1</text><text x="549" y="275" fill="#81988d">provider :8318</text>
    <text x="224" y="260" fill="#819088">mode file: local | official</text>
  </g>
</svg>
